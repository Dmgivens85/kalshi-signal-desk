[project]
name = "kalshi-client"
version = "0.1.0"
description = "Authenticated Kalshi REST and WebSocket client with typed models."
requires-python = ">=3.11"
dependencies = [
  "cryptography>=42,<45",
  "httpx>=0.27,<1",
  "pydantic>=2.7,<3",
  "tenacity>=8.4,<9",
  "websockets>=13,<16",
]

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
