services:
  web:
    build:
      context: ../..
      dockerfile: infra/docker/web.Dockerfile
    command: pnpm --dir apps/web dev --hostname 0.0.0.0 --port 3000
    env_file:
      - ../../.env
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ../..:/workspace
      - web_node_modules:/workspace/node_modules
      - web_app_node_modules:/workspace/apps/web/node_modules

  api:
    build:
      context: ../..
      dockerfile: infra/docker/api-shell.Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir services/api/app
    env_file:
      - ../../.env
    environment:
      MARKET_STREAM_HEALTH_URL: http://market-stream:9090/ready
      EXTERNAL_ENRICHMENT_HEALTH_URL: http://external-enrichment:9090/ready
      SIGNAL_ENGINE_HEALTH_URL: http://signal-engine:9090/ready
      EXECUTION_ENGINE_HEALTH_URL: http://execution-engine:9090/ready
      NOTIFIER_HEALTH_URL: http://notifier:9090/ready
      SCHEDULER_HEALTH_URL: http://scheduler:9090/ready
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    volumes:
      - ../..:/workspace

  market-stream:
    build:
      context: ../..
      dockerfile: infra/docker/python-service.Dockerfile
    command: python -m market_stream.main
    env_file:
      - ../../.env
    environment:
      SERVICE_HEALTH_PORT: 9090
    depends_on:
      - api
      - redis
    volumes:
      - ../..:/workspace

  external-enrichment:
    build:
      context: ../..
      dockerfile: infra/docker/python-service.Dockerfile
    command: python -m external_enrichment.main
    env_file:
      - ../../.env
    environment:
      SERVICE_HEALTH_PORT: 9090
    depends_on:
      - api
      - redis
    volumes:
      - ../..:/workspace

  signal-engine:
    build:
      context: ../..
      dockerfile: infra/docker/python-service.Dockerfile
    command: python -m signal_engine.main
    env_file:
      - ../../.env
    environment:
      SERVICE_HEALTH_PORT: 9090
    depends_on:
      - api
      - redis
      - postgres
    volumes:
      - ../..:/workspace

  execution-engine:
    build:
      context: ../..
      dockerfile: infra/docker/python-service.Dockerfile
    command: python -m execution_engine.main
    env_file:
      - ../../.env
    environment:
      SERVICE_HEALTH_PORT: 9090
    depends_on:
      - api
      - redis
      - postgres
    volumes:
      - ../..:/workspace

  notifier:
    build:
      context: ../..
      dockerfile: infra/docker/python-service.Dockerfile
    command: python -m notifier.main
    env_file:
      - ../../.env
    environment:
      SERVICE_HEALTH_PORT: 9090
    depends_on:
      - api
      - redis
    volumes:
      - ../..:/workspace

  scheduler:
    build:
      context: ../..
      dockerfile: infra/docker/python-service.Dockerfile
    command: python -m scheduler.main
    env_file:
      - ../../.env
    environment:
      SERVICE_HEALTH_PORT: 9090
    depends_on:
      - api
      - redis
      - postgres
    volumes:
      - ../..:/workspace

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kalshi}
      POSTGRES_USER: ${POSTGRES_USER:-kalshi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kalshi}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
  web_node_modules:
  web_app_node_modules:
