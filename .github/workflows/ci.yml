name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  platform-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install frontend dependencies
        run: pnpm install

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e packages/python-common -e services/api -e services/worker

      - name: Run API tests
        run: python -m pytest services/api/tests
